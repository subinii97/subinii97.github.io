<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subin's blog</title>
  <meta name="description" content="Subin Lim's personal blog. Profile and Diary.">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪐</text></svg>">

  <!-- Tailwind CSS v4 Browser Compiler -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="./assets/css/style.css?v=1.2.5">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y1K0WLJYQS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-Y1K0WLJYQS');
  </script>
</head>

<body id="main-page-container">

  <!-- Header Logo (Shared or Home Only) -->
  <header class="main-header" id="blog-logo-header">
    <a href="index.html" class="main-logo">Subin's blog</a>
    <div class="header-subpage" id="header-subpage-container">
      <span class="subpage-separator">/</span>
      <span class="subpage-title" id="header-subpage-title"></span>
    </div>
  </header>

  <!-- 1. HOME VIEW (Orbit Layout) -->
  <div id="home-view" class="view-section">
    <!-- Entrance Animation Overlay -->
    <div id="home-entrance-overlay"></div>

    <div class="main-wrapper">
      <div class="orbit-container">

        <!-- Triple Pendulum Canvas Overlay -->
        <canvas id="orbit-canvas" width="1300" height="1300"></canvas>

        <!-- Center Clock & Date Display -->
        <div id="center-datetime-container" class="center-datetime-container">
          <div id="center-date" class="center-date">2026. 06. 28. Sun</div>
          <div id="center-clock" class="center-clock">00:00:00</div>
        </div>

        <!-- Planet Orbit Ring with child satellites -->
        <div class="orbit-line">

          <!-- Satellite Button 1: Study -->
          <div class="orbit-satellite satellite-study">
            <button class="orbit-btn" data-target="study">
              <span>Study</span>
            </button>
          </div>

          <!-- Satellite Button 2: Diary -->
          <div class="orbit-satellite satellite-diary">
            <button class="orbit-btn" data-target="diary">
              <span>Diary</span>
            </button>
          </div>

          <!-- Satellite Button 3: History -->
          <div class="orbit-satellite satellite-history">
            <button class="orbit-btn" data-target="history">
              <span>History</span>
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Shared Footer -->
  <footer class="blog-footer">
    <div class="footer-container">
      <div class="footer-socials">
        <div class="footer-email-container">
          <a href="mailto:forestsb97@gmail.com" class="email-tooltip" id="footer-email-tooltip">
            forestsb97@gmail.com
          </a>
          <button class="footer-icon" id="footer-email-btn" title="Email"
            style="background: none; border: none; padding: 0; cursor: pointer;">
            <i class="fas fa-envelope"></i>
          </button>
        </div>
        <a href="https://www.instagram.com/subin_forest" target="_blank" rel="noopener noreferrer" class="footer-icon"
          title="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
        <a href="https://github.com/subinii97" target="_blank" rel="noopener noreferrer" class="footer-icon"
          title="GitHub">
          <i class="fab fa-github"></i>
        </a>
      </div>
      <div class="footer-credits">
        Designed by Subin, inspired by Physics
      </div>
    </div>
  </footer>

  <!-- Application Scripts -->
  <script src="./assets/js/main.js?v=1.1.24"></script>
</body>

</html>
