<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History | Subin's Blog</title>
  <meta name="description" content="Subin Lim's personal blog. Timeline and Background.">

  <!-- Tailwind CSS v4 Browser Compiler -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="../assets/css/style.css?v=1.2.5">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y1K0WLJYQS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-Y1K0WLJYQS');
  </script>
  <script>
    if (new URLSearchParams(window.location.search).get('from') !== 'home') {
      document.documentElement.classList.add('no-transition-entrance');
    }
  </script>
</head>

<body id="main-page-container" class="theme-history subpage transitioning-history">

  <!-- Pre-rendered Transition Text to prevent visual flash on load -->
  <div id="subpage-transition-text" class="transition-text-overlay active"
    style="color: var(--accent-primary); transform: translate(-50%, -50%) scale(1.25); transition: none;">History</div>

  <!-- Header Logo -->
  <header class="main-header" id="blog-logo-header">
    <a href="../index.html" class="main-logo">Subin's blog</a>
    <div class="header-subpage" id="header-subpage-container">
      <span class="subpage-separator">/</span>
      <span class="subpage-title show" id="header-subpage-title">History</span>
    </div>
  </header>



  <!-- History View Wrapper -->
  <div id="history-view" class="view-section">
    <div class="diary-wrapper container">
      <div class="reader-container" style="display: block;">
        <article class="glass-card" style="padding: 3rem 2rem;">

          <div class="history-layout">
            <!-- Year Sidebar -->
            <nav class="year-sidebar" id="year-sidebar">
              <h3 class="year-title">Years</h3>
              <div id="year-sidebar-content">
                <!-- Dynamically loaded sidebar inner list -->
              </div>
            </nav>

            <!-- Timeline column: heading + items -->
            <div class="history-timeline-wrapper">
              <div class="history-title-row">
                <h2 class="history-title">Timeline</h2>
                <div class="history-toggle-buttons">
                  <button class="history-toggle-btn active" data-tab="life">Life</button>
                  <button class="history-toggle-btn" data-tab="travel">Travel</button>
                  <button class="history-toggle-btn" data-tab="hobby">Hobby</button>
                </div>
              </div>

              <!-- Timeline Content Container -->
              <div id="history-timeline-container">
                <!-- Dynamically loaded timeline content -->
              </div>
            </div><!-- /.history-timeline-wrapper -->
          </div><!-- /.history-layout -->


        </article>
      </div>
    </div>
  </div>

  <!-- Shared Footer -->
  <footer class="blog-footer">
    <div class="footer-container">
      <div class="footer-socials">
        <div class="footer-email-container">
          <a href="mailto:forestsb97@gmail.com" class="email-tooltip" id="footer-email-tooltip">
            forestsb97@gmail.com
          </a>
          <button class="footer-icon" id="footer-email-btn" title="Email"
            style="background: none; border: none; padding: 0; cursor: pointer;">
            <i class="fas fa-envelope"></i>
          </button>
        </div>
        <a href="https://www.instagram.com/subin_forest" target="_blank" rel="noopener noreferrer" class="footer-icon"
          title="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
        <a href="https://github.com/subinii97" target="_blank" rel="noopener noreferrer" class="footer-icon"
          title="GitHub">
          <i class="fab fa-github"></i>
        </a>
      </div>
      <div class="footer-credits">
        Designed by Subin, inspired by Physics
      </div>
    </div>
  </footer>

  <!-- Application Scripts -->
  <script src="../assets/js/history.js"></script>
  <script src="../assets/js/main.js?v=1.1.24"></script>
</body>

</html>
